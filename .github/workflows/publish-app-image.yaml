name: Build and Push App Image

env:
  APP_IMAGE: ghcr.io/aihpi/workshop-agentic-rag
  DOCLING_IMAGE: ghcr.io/aihpi/workshop-agentic-rag-docling

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - app/**
      - data/data_docling_json_ocr/**
      - data/data_raw/**
      - system.md
      - .github/workflows/publish-app-image.yaml
  workflow_dispatch:

concurrency:
  group: app-image-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta_cpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push CPU image (workshop-app)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TORCH_FLAVOR=cpu
          tags: ${{ steps.meta_cpu.outputs.tags }}
          labels: ${{ steps.meta_cpu.outputs.labels }}
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      - id: meta_gpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCLING_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push GPU image (docling-service)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            TORCH_FLAVOR=cuda
          tags: ${{ steps.meta_gpu.outputs.tags }}
          labels: ${{ steps.meta_gpu.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

      - id: bump
        name: Update Kubernetes manifests (both image tags)
        run: |
          CPU_TAG=$(echo '${{ steps.meta_cpu.outputs.json }}' | jq -r '.tags[] | select(contains("sha-"))' | cut -d':' -f2)
          GPU_TAG=$(echo '${{ steps.meta_gpu.outputs.json }}' | jq -r '.tags[] | select(contains("sha-"))' | cut -d':' -f2)
          echo "cpu_tag=$CPU_TAG" >> "$GITHUB_OUTPUT"
          echo "gpu_tag=$GPU_TAG" >> "$GITHUB_OUTPUT"

          if [ ! -f k8s/deployment.yaml ] || [ ! -f k8s/docling-service.yaml ] || [ ! -f k8s/purge-cronjob.yaml ]; then
            echo "ERROR: expected manifests missing."
            exit 1
          fi

          echo "Pinning workshop-app → ${APP_IMAGE}:${CPU_TAG}"
          sed -i "s|image: ${APP_IMAGE}:.*|image: ${APP_IMAGE}:${CPU_TAG}|g" k8s/deployment.yaml
          sed -i "s|image: ${APP_IMAGE}:.*|image: ${APP_IMAGE}:${CPU_TAG}|g" k8s/purge-cronjob.yaml

          echo "Pinning docling-service → ${DOCLING_IMAGE}:${GPU_TAG}"
          sed -i "s|image: ${DOCLING_IMAGE}:.*|image: ${DOCLING_IMAGE}:${GPU_TAG}|g" k8s/docling-service.yaml

      - name: Commit manifest bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          CPU_TAG="${{ steps.bump.outputs.cpu_tag }}"
          GPU_TAG="${{ steps.bump.outputs.gpu_tag }}"
          if git diff --exit-code k8s/deployment.yaml k8s/docling-service.yaml k8s/purge-cronjob.yaml; then
            echo "No manifest change. Skipping commit."
            exit 0
          fi

          git add k8s/deployment.yaml k8s/docling-service.yaml k8s/purge-cronjob.yaml
          git commit -m "chore: bump images app=${CPU_TAG} docling=${GPU_TAG} [skip ci]"

          # Push with rebase-retry. cancel-in-progress isn't atomic — if a
          # previous run for an earlier SHA finishes its push between our
          # checkout and our push, the bare `push` rejects. Rebase our bump
          # commit on top of whatever landed and try again. Cap at 5 tries
          # so a genuinely broken main doesn't loop forever.
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed bump on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt). Pulling --rebase and retrying."
            git pull --rebase origin main
          done
          echo "Failed to push bump after 5 attempts."
          exit 1
