name: Build and Push App Image

env:
  APP_IMAGE: ghcr.io/aihpi/workshop-agentic-rag

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - app/**
      - data/data_docling_json_ocr/**
      - system.md
      - .github/workflows/publish-app-image.yaml
  workflow_dispatch:

concurrency:
  group: app-image-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: bump
        name: Update Kubernetes manifest
        run: |
          NEW_TAG=$(echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[] | select(contains("sha-"))' | cut -d':' -f2)
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          TARGET_FILE="k8s/deployment.yaml"
          if [ ! -f "$TARGET_FILE" ]; then
            echo "ERROR: $TARGET_FILE not found."
            exit 1
          fi
          echo "Pinning $TARGET_FILE to ${APP_IMAGE}:${NEW_TAG}"
          sed -i "s|image: ${APP_IMAGE}:.*|image: ${APP_IMAGE}:${NEW_TAG}|g" "$TARGET_FILE"

      - name: Commit manifest bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          TAG_NAME="${{ steps.bump.outputs.tag }}"
          if git diff --exit-code k8s/deployment.yaml; then
            echo "No manifest change. Skipping commit."
          else
            git add k8s/deployment.yaml
            git commit -m "chore: bump app image to ${TAG_NAME} [skip ci]"
            git push origin main
          fi
