apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-app
  labels:
    app: workshop-app
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: workshop-app
  template:
    metadata:
      labels:
        app: workshop-app
    spec:
      containers:
        - name: app
          image: ghcr.io/aihpi/workshop-agentic-rag:sha-405c47c
          ports:
            - containerPort: 8000
          env:
            - name: DATA_KB_DOCS_DIR
              value: /data/kb_docs
            - name: DATA_RAW_DIR
              value: /data/data_raw
            - name: DOCLING_SERVICE_URL
              value: http://docling-service.workshop-agentic-rag.svc:8080
          envFrom:
            - secretRef:
                name: workshop-app-secrets
          volumeMounts:
            - name: kb-docs
              mountPath: /data/kb_docs
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "16Gi"
              cpu: "4000m"
          # Startup: generous window for Chainlit + DB migrations + first
          # request through the import chain. 30 × 5s = 150s before
          # liveness starts ticking.
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          # Readiness: gates Service traffic. With strategy=Recreate the
          # old pod is gone before this runs, so "not ready" just means
          # clients get connection refused until /health returns 200 —
          # preferable to routing to a half-started Chainlit.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness: restart if the ASGI loop goes zombie. Loose enough
          # to tolerate a long user upload (Docling can block the
          # thread-pool worker but the event loop stays free, so /health
          # still answers quickly).
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: kb-docs
          persistentVolumeClaim:
            claimName: workshop-app-kb-docs
