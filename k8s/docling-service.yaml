# GPU-backed Docling preprocessing service.
#
# Runs at replicas: 0 by default — scale manually around workshop hours:
#   kubectl -n workshop-agentic-rag scale deploy/docling-service --replicas=1
#   kubectl -n workshop-agentic-rag scale deploy/docling-service --replicas=0
#
# TODO (see FUTURE_WORK.md "GPU Docling service"):
#   - Write app/docling_service.py — a tiny FastAPI wrapper around
#     docling.DocumentConverter exposing POST /process (multipart PDF in,
#     JSON out). Until that exists, this Deployment's container will
#     CrashLoopBackOff on scale-up because uvicorn has nothing to serve.
#   - Split into its own smaller image once CUDA is stripped from the
#     main app image.
#   - Automate scale-up/down (cron + RBAC, or app-driven via k8s API).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-service
  labels:
    app: docling-service
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: docling-service
  template:
    metadata:
      labels:
        app: docling-service
    spec:
      # Uncomment when your cluster labels GPU nodes. NVIDIA GPU Operator
      # typically adds nvidia.com/gpu.present=true; adjust to match.
      # nodeSelector:
      #   nvidia.com/gpu.present: "true"
      # tolerations:
      #   - key: nvidia.com/gpu
      #     operator: Exists
      #     effect: NoSchedule
      containers:
        - name: docling
          image: ghcr.io/aihpi/workshop-agentic-rag:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "uvicorn"]
          args:
            - "docling_service:app"
            - "--host=0.0.0.0"
            - "--port=8080"
          workingDir: /app
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: workshop-app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: docling-service
  labels:
    app: docling-service
spec:
  type: ClusterIP
  selector:
    app: docling-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
