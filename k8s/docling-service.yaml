# GPU-backed Docling preprocessing service.
#
# Replicas are driven by the in-process autoscaler in the workshop-app pod
# (see app/kb/docling_scaler.py): scale-up triggered pre-flight on each
# upload, scale back to 0 after DOCLING_IDLE_SCALEDOWN_SECONDS of no
# uploads. RBAC for this lives in [k8s/docling-rbac.yaml].
#
# `replicas: 0` here is the **bootstrap default** for fresh ArgoCD syncs.
# After bootstrap the value is irrelevant: ArgoCD's `ignoreDifferences`
# on `/spec/replicas` ([k8s/argocd/application.yaml]) keeps live replica
# counts from being reverted by selfHeal. The app patches them; manual
# `kubectl scale deploy/docling-service --replicas=N` still works as an
# operator override.
#
# When replicas=0 *and* the autoscaler is disabled (local dev, RBAC denied),
# the main app pod's upload path falls back to local CPU Docling (see
# app/kb/ingestion_pipeline.py::parse_pdf_async cold-start timeout branch).
#
# Remaining work (see FUTURE_WORK.md "GPU Docling service"):
#   - Split into its own smaller image once CUDA is stripped from the
#     main app image. Right now this reuses the 6 GB app image.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-service
  labels:
    app: docling-service
spec:
  replicas: 0
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: docling-service
  template:
    metadata:
      labels:
        app: docling-service
    spec:
      # GPU node scheduling. `accelerator=a30` pins this to A30 nodes
      # specifically (cluster has mixed A30/A100/other). nvidia.com/gpu.present
      # is belt-and-braces in case the A30 label gets removed.
      # Taint toleration lets us land on GPU-tainted nodes.
      nodeSelector:
        accelerator: a30
        nvidia.com/gpu.present: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: docling
          image: ghcr.io/aihpi/workshop-agentic-rag-docling:sha-b103353
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "uvicorn"]
          args:
            - "docling_service:app"
            - "--host=0.0.0.0"
            - "--port=8080"
          workingDir: /app
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: workshop-app-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 120
            periodSeconds: 60
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: docling-service
  labels:
    app: docling-service
spec:
  type: ClusterIP
  selector:
    app: docling-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
