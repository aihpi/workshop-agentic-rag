apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workshop-ingress
  annotations:
    # Adjust for your ingress controller (nginx, traefik, etc.)
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  rules:
    - host: workshop.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workshop-app
                port:
                  number: 8000
